# Idée de cette config : 
# - elle sera copiée dans le conteneur
# - puis les variables ${} seront remplacé par les variables d'environnement via envsubst

# Client
server {
    # PORT 80 : port par défaut de HTTP
    listen 80;

    # On écoute l'URL suivante
    server_name ${CLIENT_SERVER_NAME};

    # Et on redirige les requêtes vers ce service
    location / {
        # hostname du service est 'client' -> c'est le nom du conteneur dans le network 
        proxy_pass http://client:80;

        # Pour permettre le transfert des headers HTTP également
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# API
server {
    listen 80;
    server_name ${API_SERVER_NAME};

    location / {
        proxy_pass http://api:3001;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

